# game.toml — Sonic the Hedgehog (Sega Master System, 1991)
# Z80, 256 KB ROM (16 x 16KB banks), Sega mapper, no battery RAM.
# Verified by rom_parser: platform=SMS region=SMS-Export crc32=0xB519E833
# Primary bring-up target.

[game]
output_prefix = "sonic1sms"
platform      = "sms"
rom           = "sonicthehedgehog.sms"   # gitignored
crc32         = 0xB519E833

# Per-game RAM layout the runner reads via g_game_layout (TODO: resolve from
# static analysis / SMS disassembly). SMS RAM is $C000-$DFFF (mirror $E000).
[ram_layout]
# game_mode     = 0x____
# vblank_count  = 0x____
# player_object = 0x____

[mapper]
kind = "sega"   # frame regs $FFFC-$FFFF; reset banks 0/1/2; first 1KB fixed

# Discovery extras the static finder can't reach — grows only via the
# dispatch-miss loop (PRINCIPLES #13a), each entry cross-checked vs ROM (#16).
[functions]
extra = []
blacklist = []

# Computed-jump targets the static finder can't resolve, read from ROM.
# $4529 (bank 3): the art-decompressor command table (14 LE pointers,
# $45AE..$46D1) dispatched by `jp (hl)` at $450A.
[jump_tables]
addr  = [0x4529]
bank  = [3]
count = [14]
